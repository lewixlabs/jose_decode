<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWE Decrypt &amp; JWS Verify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    /* ── Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── File fields ── */
    .field-group {
      margin-bottom: 1.25rem;
    }

    .field-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .file-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .file-input-wrapper:focus-within,
    .file-input-wrapper:hover { border-color: #3b82f6; }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
    }

    .file-icon {
      flex-shrink: 0;
      width: 1.2rem;
      height: 1.2rem;
      color: #3b82f6;
    }

    .file-label-text {
      font-size: 0.9rem;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-label-text.selected { color: #e2e8f0; }

    /* ── Textarea JWE ── */
    textarea {
      width: 100%;
      min-height: 7rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-family: "Cascadia Code", "Fira Mono", monospace;
      font-size: 0.78rem;
      color: #a5f3fc;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #475569; }

    /* ── Button ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 0.25rem;
    }

    .btn:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result section ── */
    #result { display: none; }

    .result-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 1rem;
    }

    /* Status badges */
    .status-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: 2rem;
    }

    .badge-ok   { background: #14532d; color: #86efac; border: 1px solid #166534; }
    .badge-err  { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }

    /* Section headers inside result */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .section { margin-bottom: 1.25rem; }
    .section:last-child { margin-bottom: 0; }

    /* JSON pre blocks */
    pre {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.8rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a5f3fc;
    }

    /* Payload block – more visible */
    .payload-block {
      background: #0f172a;
      border: 1px solid #1d4ed8;
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #e2e8f0;
    }

    /* Error block */
    .error-block {
      background: #1c0606;
      border: 1px solid #7f1d1d;
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.8rem;
      color: #fca5a5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Collapsible detail */
    details summary {
      cursor: pointer;
      color: #60a5fa;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      user-select: none;
    }

    details summary:hover { color: #93c5fd; }
  </style>
</head>
<body>

<div class="container">

  <h1>JWE Decrypt &amp; JWS Verify</h1>
  <p class="subtitle">RSA-OAEP-256 + A256GCM &rarr; RS256</p>

  <div class="card">
    <!-- Private key -->
    <div class="field-group">
      <label for="privateKey">Private Key (PKCS#8 PEM)</label>
      <div class="file-input-wrapper">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        <span class="file-label-text" id="privateKeyLabel">Select file .pem / .p8 / .key…</span>
        <input type="file" id="privateKey" accept=".pem,.p8,.key" onchange="updateLabel(this,'privateKeyLabel')" />
      </div>
    </div>

    <!-- Public key -->
    <div class="field-group">
      <label for="publicKey">Public Key / Certificate (PEM)</label>
      <div class="file-input-wrapper">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="file-label-text" id="publicKeyLabel">Select file .pem / .crt / .cer…</span>
        <input type="file" id="publicKey" accept=".pem,.crt,.cer" onchange="updateLabel(this,'publicKeyLabel')" />
      </div>
    </div>

    <!-- JWE payload -->
    <div class="field-group">
      <label for="jwePayload">JWE Payload (compact, 5 segments)</label>
      <textarea id="jwePayload" placeholder="Paste the JWE token here…" spellcheck="false" autocomplete="off"></textarea>
    </div>

    <button class="btn" id="decryptBtn" onclick="decrypt()">
      <div class="spinner"></div>
      <span class="btn-text">Decrypt &amp; Verify</span>
    </button>
  </div>

  <!-- ── Result ── -->
  <div id="result">
    <div class="card">
      <div class="result-title">Result</div>

      <div class="status-row" id="statusRow"></div>

      <div id="resultBody"></div>
    </div>
  </div>

</div><!-- /container -->

<script>
  function updateLabel(input, labelId) {
    const el = document.getElementById(labelId);
    if (input.files && input.files[0]) {
      el.textContent = input.files[0].name;
      el.classList.add("selected");
    } else {
      el.classList.remove("selected");
    }
  }

  function jsonOrString(value) {
    if (typeof value === "string") return value;
    return JSON.stringify(value, null, 2);
  }

  function makeBadge(label, ok) {
    const b = document.createElement("span");
    b.className = "badge " + (ok ? "badge-ok" : "badge-err");
    b.textContent = (ok ? "✓ " : "✗ ") + label;
    return b;
  }

  function makeSection(labelText, content, isPayload, isError) {
    const wrap = document.createElement("div");
    wrap.className = "section";

    const lbl = document.createElement("div");
    lbl.className = "section-label";
    lbl.textContent = labelText;
    wrap.appendChild(lbl);

    const pre = document.createElement("pre");
    pre.className = isPayload ? "payload-block" : (isError ? "error-block" : "");
    pre.textContent = content;
    wrap.appendChild(pre);

    return wrap;
  }

  async function decrypt() {
    const btn = document.getElementById("decryptBtn");
    const pkFile  = document.getElementById("privateKey").files[0];
    const pubFile = document.getElementById("publicKey").files[0];
    const jweText = document.getElementById("jwePayload").value.trim();

    if (!pkFile || !pubFile) {
      alert("Please load the private key and the public key before proceeding.");
      return;
    }
    if (!jweText) {
      alert("Please paste the JWE token before proceeding.");
      return;
    }

    btn.disabled = true;
    btn.classList.add("loading");

    const formData = new FormData();
    formData.append("private_key", pkFile);
    formData.append("public_key",  pubFile);
    formData.append("jwe_token",   jweText);

    let data;
    try {
      const resp = await fetch("/api/decrypt", { method: "POST", body: formData });
      data = await resp.json();
    } catch (e) {
      data = { error: "Network error: " + e.message };
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }

    // ── Render result ────────────────────────────────────────────────────────
    const result   = document.getElementById("result");
    const statusRow = document.getElementById("statusRow");
    const body     = document.getElementById("resultBody");

    statusRow.innerHTML = "";
    body.innerHTML = "";
    result.style.display = "block";

    if (data.error) {
      statusRow.appendChild(makeBadge("Error", false));
      body.appendChild(makeSection("Error detail", data.error
        + (data.detail ? "\n\n" + data.detail : ""), false, true));
      return;
    }

    statusRow.appendChild(makeBadge("JWE Decryption: OK", true));
    statusRow.appendChild(makeBadge("JWS Verification: OK", true));

    // Payload (main highlight)
    body.appendChild(makeSection("Plaintext Payload", jsonOrString(data.payload), true, false));

    // JWE / JWS headers in collapsible sections
    const jweDetails = document.createElement("details");
    jweDetails.innerHTML = `<summary>JWE Protected Header</summary>`;
    const jwePre = document.createElement("pre");
    jwePre.textContent = JSON.stringify(data.jwe_header, null, 2);
    jweDetails.appendChild(jwePre);

    const jwsDetails = document.createElement("details");
    jwsDetails.innerHTML = `<summary>JWS Header</summary>`;
    const jwsPre = document.createElement("pre");
    jwsPre.textContent = JSON.stringify(data.jws_header, null, 2);
    jwsDetails.appendChild(jwsPre);

    const headersWrap = document.createElement("div");
    headersWrap.className = "section";
    headersWrap.appendChild(jweDetails);
    headersWrap.style.marginTop = "1rem";
    const headersWrap2 = document.createElement("div");
    headersWrap2.className = "section";
    headersWrap2.appendChild(jwsDetails);

    body.appendChild(headersWrap);
    body.appendChild(headersWrap2);
  }
</script>

</body>
</html>
